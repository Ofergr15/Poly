<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In — Trading Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0e27;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image:
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(59, 130, 246, 0.15) 0px, transparent 50%);
        }

        .card {
            background: rgba(17, 25, 54, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 48px 40px;
            text-align: center;
            width: 100%;
            max-width: 400px;
            backdrop-filter: blur(20px);
        }

        .logo {
            font-size: 3em;
            margin-bottom: 16px;
        }

        h1 {
            font-size: 1.6em;
            font-weight: 800;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        p {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.95em;
            margin-bottom: 36px;
        }

        .google-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: #fff;
            color: #333;
            font-size: 0.95em;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            padding: 14px 24px;
            border-radius: 12px;
            text-decoration: none;
            border: none;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s, box-shadow 0.2s;
        }

        .google-btn:hover {
            background: #f5f5f5;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .google-icon {
            width: 20px;
            height: 20px;
        }

        .footer {
            margin-top: 32px;
            font-size: 0.8em;
            color: rgba(255, 255, 255, 0.25);
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">📈</div>
        <h1>Trading Dashboard</h1>
        <p>Polymarket RL Scalper — Live Performance Monitor</p>

        <a href="/login" class="google-btn">
            <svg class="google-icon" viewBox="0 0 48 48">
                <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
                <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
                <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
                <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
                <path fill="none" d="M0 0h48v48H0z"/>
            </svg>
            Sign in with Google
        </a>

        <div class="footer">Access restricted to authorized users only.</div>
    </div>
</body>
</html>
